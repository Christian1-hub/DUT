<!DOCTYPE html>
<html class="light" lang="fr">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Connexion - CamunoLearn</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        primary: "#00602a",
                        "on-surface": "#191c1e",
                        background: "#f8f9fb",
                    },
                    fontFamily: { headline: ["Manrope"], body: ["Inter"] }
                },
            },
        }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; }
        .hero-gradient     { background: linear-gradient(135deg, #00602a 0%, #1a7a3c 100%); }
        .academic-gradient { background: linear-gradient(135deg, #00602a 0%, #1a7a3c 100%); }
        .tonal-elevation   { box-shadow: 0px 12px 32px rgba(25, 28, 30, 0.08); }
        .fade-up {
            opacity: 0; transform: translateY(28px);
            transition: opacity 0.65s cubic-bezier(0.22, 1, 0.36, 1),
                        transform 0.65s cubic-bezier(0.22, 1, 0.36, 1);
        }
        .fade-up.show { opacity: 1; transform: translateY(0); }
        .loader-overlay {
            position: fixed; top:0; left:0; width:100%; height:100%;
            background-color: rgba(0,0,0,0.7); backdrop-filter: blur(8px);
            display: flex; align-items: center; justify-content: center; z-index: 1000;
        }
        .loader-content {
            background: white; border-radius: 2rem; padding: 2rem;
            text-align: center; max-width: 90%; width: 320px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
        }
        .spinner {
            border: 4px solid #f3f3f3; border-top: 4px solid #00602a;
            border-radius: 50%; width: 48px; height: 48px;
            animation: spin 1s linear infinite; margin: 0 auto 1rem;
        }
        @keyframes spin { 0%{transform:rotate(0deg)} 100%{transform:rotate(360deg)} }
        .alert { border-radius: 12px; padding: 12px 16px; font-size: 0.85rem; }
        .alert-error { background:#fef2f2; color:#b91c1c; border:1px solid #fecaca; }
    </style>
</head>
<body class="min-h-screen flex flex-col relative overflow-x-hidden bg-[#f8f9fb]">

<script>const API_BASE = (function() {
  var h = window.location.hostname;
  if (h === 'localhost' || h === '127.0.0.1') return 'http://localhost:3000/api';
  return '/api';
})();</script>

<!-- Lang toggle -->
<div class="fixed top-5 right-5 z-50">
    <button id="langToggle" class="flex items-center gap-2 px-4 py-2 rounded-full bg-white shadow-md border border-gray-200 hover:bg-gray-50 transition-colors text-sm font-medium">
        <span class="material-symbols-outlined text-base">language</span>
        <span id="langLabel">FR</span>
    </button>
</div>

<!-- Blobs décoratifs -->
<div class="fixed inset-0 -z-10">
    <div class="absolute -top-24 -left-24 w-96 h-96 hero-gradient opacity-10 rounded-full blur-3xl"></div>
    <div class="absolute -bottom-32 -right-32 w-[30rem] h-[30rem] hero-gradient opacity-10 rounded-full blur-3xl"></div>
</div>

<main class="flex-grow flex items-center justify-center px-4 py-16">
    <div class="w-full max-w-md">
        <div class="bg-white rounded-2xl p-10 tonal-elevation border border-gray-100 flex flex-col gap-8">

            <!-- Logo -->
            <div class="flex flex-col items-center text-center">
                <div class="flex items-center gap-2 mb-6 fade-up">
                    <span class="material-symbols-outlined text-primary text-4xl"
                          style="font-variation-settings:'FILL' 1;">school</span>
                    <span class="font-headline font-extrabold text-2xl tracking-tight text-primary">
                        <span class="text-on-surface">Camuno</span>Learn
                    </span>
                </div>
                <div class="space-y-2">
                    <h1 class="font-headline text-2xl font-bold text-on-surface tracking-tight fade-up">
                        Bon retour parmi nous
                    </h1>
                    <p class="font-body text-gray-500 text-sm fade-up">
                        Connectez-vous pour continuer votre apprentissage
                    </p>
                </div>
            </div>

            <!-- Alerte -->
            <div id="alertBox" class="hidden alert alert-error"></div>

            <!-- Formulaire -->
            <form id="loginForm" class="space-y-6 fade-up">

                <div class="space-y-1.5">
                    <label class="text-[0.7rem] font-bold uppercase tracking-widest text-gray-400 ml-1">
                        Email
                    </label>
                    <div class="relative flex items-center bg-gray-50 rounded-xl px-4 py-3.5
                                focus-within:ring-2 focus-within:ring-primary/20 transition-all">
                        <span class="material-symbols-outlined text-gray-400 mr-3 text-[1.2rem]">mail</span>
                        <input id="emailInput" type="email" required
                               placeholder="nom@exemple.com"
                               class="bg-transparent border-none focus:ring-0 w-full text-sm text-on-surface"/>
                    </div>
                </div>

                <div class="space-y-1.5">
                    <label class="text-[0.7rem] font-bold uppercase tracking-widest text-gray-400 ml-1">
                        Mot de passe
                    </label>
                    <div class="relative flex items-center bg-gray-50 rounded-xl px-4 py-3.5
                                focus-within:ring-2 focus-within:ring-primary/20 transition-all">
                        <span class="material-symbols-outlined text-gray-400 mr-3 text-[1.2rem]">lock</span>
                        <input id="passwordInput" type="password" required
                               placeholder="••••••••"
                               class="bg-transparent border-none focus:ring-0 w-full text-sm text-on-surface"/>
                        <button type="button" id="togglePassword"
                                class="text-gray-400 hover:text-primary transition focus:outline-none">
                            <span class="material-symbols-outlined text-[1.2rem]" id="passwordIcon">visibility</span>
                        </button>
                    </div>
                </div>

                <div class="flex items-center justify-between px-1">
                    <label class="flex items-center gap-2 cursor-pointer">
                        <input type="checkbox" id="rememberMe"
                               class="rounded text-primary focus:ring-primary h-4 w-4 border-gray-300"/>
                        <span class="text-xs text-gray-500">Rester connecté</span>
                    </label>
                    <a class="text-xs font-bold text-primary hover:underline" href="#">Mot de passe oublié ?</a>
                </div>

                <button type="submit" id="submitBtn"
                        class="w-full academic-gradient text-white py-4 rounded-xl font-headline font-bold
                               text-sm tracking-wide shadow-lg shadow-primary/20 hover:opacity-95
                               active:scale-[0.98] transition-all flex items-center justify-center gap-2">
                    Se connecter
                    <span class="material-symbols-outlined text-[1.2rem]">arrow_forward</span>
                </button>
            </form>

            <div class="pt-2 flex flex-col gap-4 text-center fade-up">
                <div class="h-[1px] w-full bg-gray-100"></div>
                <p class="font-body text-sm text-gray-500">
                    Nouveau sur la plateforme ?
                    <a class="text-primary font-bold hover:underline ml-1"
                       href="indexInscription.html">Créer un compte</a>
                </p>
            </div>

        </div>
    </div>
</main>

<footer class="w-full py-8 bg-white border-t border-gray-100 mt-auto">
    <div class="max-w-7xl mx-auto px-8 flex justify-between items-center text-gray-400 text-xs font-medium">
        <p>© 2026 CamunoLearn — Douala</p>
        <div class="flex gap-6">
            <a href="#" class="hover:text-primary">Aide</a>
            <a href="#" class="hover:text-primary">Confidentialité</a>
            <a href="indexSUPERADMIN.html" style="color:transparent;font-size:8px;user-select:none" tabindex="-1">·</a>
        </div>
    </div>
</footer>

<!-- Loader -->
<div id="loaderOverlay" class="loader-overlay" style="display:none;">
    <div class="loader-content">
        <div class="spinner"></div>
        <h3 class="font-headline font-bold text-xl text-gray-800 mb-1" id="loaderTitle">
            Authentification
        </h3>
        <p class="text-gray-500 text-sm" id="loaderMessage">
            Vérification de vos identifiants...
        </p>
    </div>
</div>

<script>
// ══════════════════════════════════════════════════════
//  LANGUE
// ══════════════════════════════════════════════════════
let currentLang = 'fr';
document.getElementById('langToggle').addEventListener('click', () => {
    currentLang = currentLang === 'fr' ? 'en' : 'fr';
    document.getElementById('langLabel').textContent = currentLang.toUpperCase();
});

// ══════════════════════════════════════════════════════
//  PASSWORD TOGGLE
// ══════════════════════════════════════════════════════
document.getElementById('togglePassword').addEventListener('click', () => {
    const input = document.getElementById('passwordInput');
    const icon  = document.getElementById('passwordIcon');
    const isPass = input.type === 'password';
    input.type       = isPass ? 'text' : 'password';
    icon.textContent = isPass ? 'visibility_off' : 'visibility';
});

// ══════════════════════════════════════════════════════
//  HELPERS
// ══════════════════════════════════════════════════════
function showAlert(msg) {
    const box = document.getElementById('alertBox');
    box.textContent = msg;
    box.classList.remove('hidden');
}
function hideAlert() {
    document.getElementById('alertBox').classList.add('hidden');
}
function showLoader(title, msg) {
    document.getElementById('loaderTitle').textContent   = title;
    document.getElementById('loaderMessage').textContent = msg;
    document.getElementById('loaderOverlay').style.display = 'flex';
}
function hideLoader() {
    document.getElementById('loaderOverlay').style.display = 'none';
}

// ══════════════════════════════════════════════════════
//  LOGIQUE DE REDIRECTION
//
//  Règle simple :
//  ┌─────────────────────────────────────────────────┐
//  │  school = null ou vide ?                        │
//  │    OUI → indexSélectionEcole.html               │
//  │           (étudiant ET professeur)              │
//  │    NON → dashboard selon rôle :                 │
//  │           etudiant   → indexETUDIANT.html       │
//  │           enseignant → indexEnseignant.html     │
//  │           admin      → indexADMIN.html          │
//  └─────────────────────────────────────────────────┘
// ══════════════════════════════════════════════════════
function redirectAfterLogin(user, needsSchool) {
    if (needsSchool) {
        showLoader('Bienvenue !', 'Sélectionnez votre établissement...');
        setTimeout(() => {
            window.location.href = 'indexSélectionEcole.html';
        }, 1000);
        return;
    }

    const dashboards = {
        admin:      'indexADMIN.html',
        enseignant: 'indexEnseignant.html',
        etudiant:   'indexETUDIANT.html',
        superadmin: 'indexSUPERADMIN.html',
    };

    showLoader('Connexion réussie !', 'Redirection vers votre espace...');
    setTimeout(() => {
        window.location.href = dashboards[user.role] || 'indexETUDIANT.html';
    }, 1000);
}

// ══════════════════════════════════════════════════════
//  SOUMISSION
// ══════════════════════════════════════════════════════
document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    hideAlert();

    const email    = document.getElementById('emailInput').value.trim();
    const password = document.getElementById('passwordInput').value;
    const remember = document.getElementById('rememberMe').checked;
    const btn      = document.getElementById('submitBtn');

    if (!email || !password) {
        showAlert('Veuillez remplir tous les champs.');
        return;
    }

    showLoader('Authentification', 'Vérification de vos identifiants...');
    btn.disabled = true;

    try {
        const response = await fetch(`${API_BASE}/auth/login`, {
            method:  'POST',
            headers: { 'Content-Type': 'application/json' },
            body:    JSON.stringify({ email, password }),
        });

        const data = await response.json();

        if (response.ok && data.success) {

            // ── 1. Stocker le token ──────────────────────
            // Si "Rester connecté" → localStorage (persiste)
            // Sinon               → sessionStorage (expire à la fermeture)
            const storage = remember ? localStorage : sessionStorage;
            storage.setItem('camunolearn_token', data.token);
            storage.setItem('camunolearn_user',  JSON.stringify(data.user));

            // Toujours dans localStorage pour que les autres pages y aient accès
            localStorage.setItem('camunolearn_token', data.token);
            localStorage.setItem('camunolearn_user',  JSON.stringify(data.user));
            localStorage.setItem('userRole',  data.user.role);
            localStorage.setItem('userEmail', data.user.email);
            if (data.user.school) {
                localStorage.setItem('userSchool', data.user.school);
            }

            // ── 2. Rediriger ─────────────────────────────
            // data.needsSchool = true  → école jamais choisie
            // data.needsSchool = false → école déjà en base
            redirectAfterLogin(data.user, data.needsSchool);

        } else {
            hideLoader();
            btn.disabled = false;
            showAlert(data.message || 'Email ou mot de passe incorrect.');
        }

    } catch (err) {
        hideLoader();
        btn.disabled = false;
        showAlert('Impossible de contacter le serveur. Vérifiez votre connexion.');
    }
});

// ══════════════════════════════════════════════════════
//  ANIMATIONS
// ══════════════════════════════════════════════════════
document.addEventListener('DOMContentLoaded', () => {
    document.querySelectorAll('.fade-up').forEach((el, i) => {
        setTimeout(() => el.classList.add('show'), 150 + i * 160);
    });
});
</script>


</body>
</html>
