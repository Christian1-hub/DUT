<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Confirmation - CamunoLearn</title>
<script>
// BLOQUER toute redirection automatique sur cette page
localStorage.removeItem('userRole');
</script>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'DM Sans',sans-serif}
body{background:#f8f9fb;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:16px}
.card{background:#fff;border-radius:24px;padding:32px;max-width:360px;width:100%;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.12)}
.spinner{border:4px solid #f3f3f3;border-top:4px solid #00602a;border-radius:50%;width:48px;height:48px;animation:spin 1s linear infinite;margin:0 auto 16px}
@keyframes spin{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}
input{width:100%;background:#f9fafb;border:1.5px solid #e5e7eb;border-radius:10px;padding:11px 14px;font-size:.9rem;outline:none;margin-bottom:10px;font-family:inherit}
input:focus{border-color:#00602a}
.btn{width:100%;padding:14px;border:none;border-radius:12px;font-weight:800;font-size:1rem;cursor:pointer;margin-top:8px;font-family:inherit}
.logo{font-size:1.5rem;font-weight:900;margin-bottom:20px}
.logo span{color:#00602a}
</style>
</head>
<body>
<div class="card">
    <div class="logo"><span>Camuno</span>Learn</div>

    <!-- Chargement -->
    <div id="s-load">
        <div class="spinner"></div>
        <p style="color:#6b7280;font-size:.85rem">Vérification...</p>
    </div>

    <!-- Login -->
    <div id="s-login" style="display:none">
        <div style="font-size:2.5rem;margin-bottom:12px">🔐</div>
        <h2 style="font-weight:900;font-size:1.2rem;color:#111;margin-bottom:8px">Connectez-vous</h2>
        <p style="font-size:.82rem;color:#6b7280;margin-bottom:20px">Pour confirmer votre rôle sur ce téléphone.</p>
        <input id="email" type="email" placeholder="Email"/>
        <input id="password" type="password" placeholder="Mot de passe"/>
        <div id="err" style="display:none;background:#fef2f2;color:#b91c1c;border-radius:8px;padding:8px 12px;font-size:.8rem;margin-bottom:8px"></div>
        <button class="btn" onclick="doLogin()" style="background:#00602a;color:#fff">Se connecter</button>
    </div>

    <!-- Confirmer -->
    <div id="s-confirm" style="display:none">
        <div id="c-icon" style="font-size:3rem;margin-bottom:12px"></div>
        <h2 style="font-weight:900;font-size:1.2rem;color:#111;margin-bottom:8px">Confirmer votre rôle</h2>
        <p id="c-sub" style="font-size:.85rem;color:#6b7280;margin-bottom:16px"></p>
        <div style="background:#fffbeb;border:1px solid #fde68a;border-radius:10px;padding:10px;font-size:.75rem;color:#92400e;margin-bottom:16px">
            ⚠️ Ce rôle est <strong>définitif</strong>.
        </div>
        <button id="c-btn" class="btn" onclick="confirm_()" style="color:#fff">✅ Confirmer</button>
    </div>

    <!-- Succès -->
    <div id="s-ok" style="display:none">
        <div style="font-size:3.5rem;margin-bottom:16px">✅</div>
        <h2 style="font-weight:900;font-size:1.3rem;color:#111;margin-bottom:8px">Confirmé !</h2>
        <p style="font-size:.85rem;color:#6b7280;margin-bottom:16px">Retournez sur votre PC.</p>
        <div style="background:#f0fdf4;border:1px solid #bbf7d0;border-radius:12px;padding:14px;font-size:.82rem;color:#166534">
            🖥️ Votre PC se redirige automatiquement vers la suite.
        </div>
    </div>

    <!-- Erreur -->
    <div id="s-err" style="display:none">
        <div id="e-icon" style="font-size:2.5rem;margin-bottom:12px">❌</div>
        <h2 id="e-title" style="font-weight:900;font-size:1.2rem;color:#111;margin-bottom:8px"></h2>
        <p id="e-sub" style="font-size:.82rem;color:#6b7280"></p>
    </div>
</div>

<script>
var API_BASE = window.location.hostname==='localhost'||window.location.hostname==='127.0.0.1'
    ? 'http://localhost:3000/api'
    : 'https://camunolearn-api.onrender.com/api';

var params    = new URLSearchParams(location.search);
var sessionId = params.get('session');
var token     = localStorage.getItem('camunolearn_token');
var userRole  = null;

var ROLES = {
    etudiant:   {icon:'🎓', label:'Étudiant',   color:'#00602a'},
    enseignant: {icon:'👨‍🏫', label:'Enseignant', color:'#1d4ed8'},
    admin:      {icon:'⚙️',  label:'Admin',      color:'#7c3aed'}
};

function show(id) {
    ['s-load','s-login','s-confirm','s-ok','s-err'].forEach(function(x){
        document.getElementById(x).style.display = x===id ? 'block' : 'none';
    });
}

function showErr(icon, title, sub) {
    document.getElementById('e-icon').textContent  = icon;
    document.getElementById('e-title').textContent = title;
    document.getElementById('e-sub').textContent   = sub;
    show('s-err');
}

async function init() {
    if (!sessionId) { showErr('❌','Lien invalide','QR code invalide ou expiré.'); return; }

    // Vérifier session
    try {
        var sr = await fetch(API_BASE + '/qrsession/status/' + sessionId);
        var sd = await sr.json();
        if (sd.status === 'expired')   { showErr('⏱️','QR expiré','Revenez sur votre PC et réessayez.'); return; }
        if (sd.status === 'validated') { showErr('✅','Déjà confirmé','Ce QR a déjà été utilisé.'); return; }
    } catch(e) { showErr('❌','Serveur inaccessible','Vérifiez votre connexion.'); return; }

    // Pas de token → login
    if (!token) { show('s-login'); return; }

    // Vérifier token
    try {
        var r = await fetch(API_BASE + '/auth/me', {headers:{Authorization:'Bearer '+token}});
        var d = await r.json();
        if (!d.success) { show('s-login'); return; }
        showConfirm(d.user.role);
    } catch(e) { show('s-login'); }
}

function showConfirm(role) {
    userRole = role;
    var info = ROLES[role] || {icon:'👤', label:role, color:'#374151'};
    document.getElementById('c-icon').textContent       = info.icon;
    document.getElementById('c-sub').textContent        = 'Vous allez vous identifier en tant que ' + info.label;
    document.getElementById('c-btn').style.background   = info.color;
    document.getElementById('c-btn').textContent        = '✅ Confirmer — ' + info.label;
    show('s-confirm');
}

async function doLogin() {
    var email    = document.getElementById('email').value.trim();
    var password = document.getElementById('password').value;
    var errDiv   = document.getElementById('err');
    errDiv.style.display = 'none';
    if (!email||!password) { errDiv.textContent='Remplissez email et mot de passe.'; errDiv.style.display='block'; return; }

    var btn = document.querySelector('#s-login .btn');
    btn.textContent='Connexion...'; btn.disabled=true;

    try {
        var r = await fetch(API_BASE+'/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email,password})});
        var d = await r.json();
        if (d.success) {
            token = d.token;
            // NE PAS sauvegarder userRole dans localStorage
            localStorage.setItem('camunolearn_token', token);
            showConfirm(d.user.role);
        } else {
            errDiv.textContent = d.message||'Identifiants incorrects.';
            errDiv.style.display='block';
            btn.textContent='Se connecter'; btn.disabled=false;
        }
    } catch(e) {
        errDiv.textContent='Serveur inaccessible.';
        errDiv.style.display='block';
        btn.textContent='Se connecter'; btn.disabled=false;
    }
}

async function confirm_() {
    document.getElementById('c-btn').textContent='Validation...';
    document.getElementById('c-btn').disabled=true;

    try {
        var r = await fetch(API_BASE+'/qrsession/validate/'+sessionId,{
            method:'POST',
            headers:{'Content-Type':'application/json',Authorization:'Bearer '+token},
            body:JSON.stringify({})
        });
        var d = await r.json();
        if (d.success) {
            show('s-ok');
        } else {
            showErr('❌', d.message||'Erreur', 'Réessayez.');
        }
    } catch(e) {
        showErr('❌','Erreur réseau','Vérifiez votre connexion.');
    }
}

init();
</script>
</body>
</html>
